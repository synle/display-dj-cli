name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0). Leave empty to use Cargo.toml version.'
        required: false
        type: string
      release_notes:
        description: 'Optional release notes to include at the top of the release body.'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION} (tag: v${VERSION})"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: display-dj-macos-arm64
            run_tests: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: display-dj-macos-x64
            run_tests: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: display-dj-windows-x64
            run_tests: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: display-dj-windows-arm64
            run_tests: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: display-dj-linux-x64
            run_tests: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: display-dj-linux-arm64
            run_tests: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Run tests
        if: matrix.run_tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/display-dj ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/display-dj.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Delete existing release and tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true

      - name: Generate release body
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          > body.md

          # User notes at top
          if [ -n "$RELEASE_NOTES" ]; then
            printf '%s\n\n' "$RELEASE_NOTES" >> body.md
          fi

          echo "## What's Changed" >> body.md
          echo "" >> body.md

          # Find previous tag (exclude current tag if still present locally)
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --pretty=format:'- `%h` %s' --no-merges -10 >> body.md
          else
            git log --pretty=format:'- `%h` %s' --no-merges -10 >> body.md
          fi
          echo "" >> body.md
          echo "" >> body.md

          # Full changelog diff link
          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}" >> body.md
            echo "" >> body.md
          fi

          echo "---" >> body.md
          echo "" >> body.md

          # Static install/setup instructions from template file
          cat .github/release-body-static.md >> body.md
          echo "" >> body.md

          # Downloads table
          echo "## Downloads" >> body.md
          echo "" >> body.md
          echo "| Asset | Platform |" >> body.md
          echo "|-------|----------|" >> body.md
          echo "| [\`display-dj-macos-arm64\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-macos-arm64) | macOS Apple Silicon |" >> body.md
          echo "| [\`display-dj-macos-x64\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-macos-x64) | macOS Intel |" >> body.md
          echo "| [\`display-dj-windows-x64.exe\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-windows-x64.exe) | Windows x64 |" >> body.md
          echo "| [\`display-dj-windows-arm64.exe\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-windows-arm64.exe) | Windows ARM64 |" >> body.md
          echo "| [\`display-dj-linux-x64\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-linux-x64) | Linux x64 |" >> body.md
          echo "| [\`display-dj-linux-arm64\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-linux-arm64) | Linux ARM64 |" >> body.md
          echo "" >> body.md
          echo "See [README](https://github.com/${REPO}/blob/main/README.md) for full docs." >> body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: display-dj ${{ needs.prepare.outputs.tag }}
          body_path: body.md
          files: |
            artifacts/display-dj-macos-arm64/display-dj-macos-arm64
            artifacts/display-dj-macos-x64/display-dj-macos-x64
            artifacts/display-dj-windows-x64/display-dj-windows-x64.exe
            artifacts/display-dj-windows-arm64/display-dj-windows-arm64.exe
            artifacts/display-dj-linux-x64/display-dj-linux-x64
            artifacts/display-dj-linux-arm64/display-dj-linux-arm64
