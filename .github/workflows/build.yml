name: Build Release Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: display-dj-macos-arm64
            run_tests: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: display-dj-macos-x64
            run_tests: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: display-dj-windows-x64
            run_tests: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: display-dj-windows-arm64
            run_tests: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: display-dj-linux-x64
            run_tests: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: display-dj-linux-arm64
            run_tests: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Run tests
        if: matrix.run_tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/display-dj ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/display-dj.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*
          retention-days: 90
