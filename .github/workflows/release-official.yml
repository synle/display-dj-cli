name: Release Official

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0). Leave empty to use Cargo.toml version.'
        required: false
        type: string
      release_notes:
        description: 'Optional release notes to include at the top of the release body.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pre.outputs.tag }}
      version: ${{ steps.pre.outputs.version }}
      sha: ${{ steps.pre.outputs.sha }}
    steps:
      - uses: synle/workflows/actions/release/begin-release@main
        id: pre
        with:
          mode: official
          project_name: display-dj-cli
          version: ${{ inputs.version }}
          version_file: Cargo.toml

  build:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: display-dj-macos-arm64
            run_tests: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: display-dj-macos-x64
            run_tests: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: display-dj-windows-x64
            run_tests: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: display-dj-windows-arm64
            run_tests: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: display-dj-linux-x64
            run_tests: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: display-dj-linux-arm64
            run_tests: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Run tests
        if: matrix.run_tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/display-dj ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/display-dj.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*

  release:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: synle/workflows/actions/release/_common/notes@main
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          project_name: display-dj-cli
          user_notes: ${{ inputs.release_notes }}
          extra_body_path: .github/release-body-static.md

      - name: Append downloads table
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Asset | Platform |"
            echo "|-------|----------|"
            echo "| [\`display-dj-macos-arm64\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-macos-arm64) | macOS Apple Silicon |"
            echo "| [\`display-dj-macos-x64\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-macos-x64) | macOS Intel |"
            echo "| [\`display-dj-windows-x64.exe\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-windows-x64.exe) | Windows x64 |"
            echo "| [\`display-dj-windows-arm64.exe\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-windows-arm64.exe) | Windows ARM64 |"
            echo "| [\`display-dj-linux-x64\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-linux-x64) | Linux x64 |"
            echo "| [\`display-dj-linux-arm64\`](https://github.com/${REPO}/releases/download/${TAG}/display-dj-linux-arm64) | Linux ARM64 |"
            echo ""
            echo "See [README](https://github.com/${REPO}/blob/main/README.md) for full docs."
          } >> release-notes.md

      - uses: synle/workflows/actions/release/_common/finalize@main
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          project_name: display-dj-cli
          mode: official
          build_result: ${{ needs.build.result }}
          files: |
            artifacts/display-dj-macos-arm64/display-dj-macos-arm64
            artifacts/display-dj-macos-x64/display-dj-macos-x64
            artifacts/display-dj-windows-x64/display-dj-windows-x64.exe
            artifacts/display-dj-windows-arm64/display-dj-windows-arm64.exe
            artifacts/display-dj-linux-x64/display-dj-linux-x64
            artifacts/display-dj-linux-arm64/display-dj-linux-arm64
