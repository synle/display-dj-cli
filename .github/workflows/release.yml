name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0). Leave empty to use Cargo.toml version.'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION} (tag: v${VERSION})"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: display-dj-macos-arm64
            run_tests: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: display-dj-macos-x64
            run_tests: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: display-dj-windows-x64
            run_tests: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: display-dj-windows-arm64
            run_tests: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: display-dj-linux-x64
            run_tests: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: display-dj-linux-arm64
            run_tests: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Run tests
        if: matrix.run_tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/display-dj ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/display-dj.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: display-dj ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/display-dj-macos-arm64/display-dj-macos-arm64
            artifacts/display-dj-macos-x64/display-dj-macos-x64
            artifacts/display-dj-windows-x64/display-dj-windows-x64.exe
            artifacts/display-dj-windows-arm64/display-dj-windows-arm64.exe
            artifacts/display-dj-linux-x64/display-dj-linux-x64
            artifacts/display-dj-linux-arm64/display-dj-linux-arm64
          body: |
            ## Install

            Download the binary for your platform, make it executable, and move to your PATH:

            ```bash
            # macOS (Apple Silicon)
            chmod +x display-dj-macos-arm64 && mv display-dj-macos-arm64 /usr/local/bin/display-dj

            # macOS (Intel)
            chmod +x display-dj-macos-x64 && mv display-dj-macos-x64 /usr/local/bin/display-dj

            # Linux
            chmod +x display-dj-linux-x64 && sudo mv display-dj-linux-x64 /usr/local/bin/display-dj

            # Windows: move display-dj-windows-x64.exe somewhere in your PATH
            ```

            ## Quick start

            ```bash
            display-dj list              # see your displays
            display-dj set_all 50        # set all to 50%
            display-dj serve             # start HTTP server on port 51337
            ```

            ## Platform dependencies

            **macOS** — No external dependencies. Everything uses native frameworks.

            **Windows** — Volume control requires a one-time PowerShell module install:

            ```powershell
            Install-Module -Name AudioDeviceCmdlets
            ```

            All other features (brightness, dark mode, scaling) work out of the box.

            **Linux** — Requires external CLI tools. Install for your distro:

            <details>
            <summary>Ubuntu / Debian</summary>

            ```bash
            sudo apt install ddcutil i2c-tools brightnessctl pulseaudio-utils alsa-utils x11-xserver-utils wlr-randr
            sudo modprobe i2c-dev
            echo "i2c-dev" | sudo tee /etc/modules-load.d/i2c-dev.conf
            sudo usermod -aG i2c $USER
            ```

            </details>

            <details>
            <summary>Fedora / RHEL</summary>

            ```bash
            sudo dnf install ddcutil i2c-tools brightnessctl pulseaudio-utils alsa-utils xrandr wlr-randr
            sudo modprobe i2c-dev
            echo "i2c-dev" | sudo tee /etc/modules-load.d/i2c-dev.conf
            sudo usermod -aG i2c $USER
            ```

            </details>

            <details>
            <summary>Arch / Manjaro</summary>

            ```bash
            sudo pacman -S ddcutil i2c-tools brightnessctl libpulse alsa-utils xorg-xrandr wlr-randr
            sudo modprobe i2c-dev
            echo "i2c-dev" | sudo tee /etc/modules-load.d/i2c-dev.conf
            sudo usermod -aG i2c $USER
            ```

            </details>

            | Feature | Tool | Required? |
            |---------|------|-----------|
            | Built-in brightness | `brightnessctl` or sysfs write access | Yes (for laptops) |
            | External monitor brightness | `ddcutil` + `i2c-dev` module | Yes (for external monitors) |
            | Volume | `pactl` (PulseAudio/PipeWire) | Yes, `amixer` as fallback |
            | Dark mode (GNOME) | `gsettings` | Comes with GNOME |
            | Dark mode (KDE) | `plasma-apply-colorscheme` | Comes with KDE |
            | Dark mode (XFCE) | `xfconf-query` | Comes with XFCE |
            | Scaling (X11) | `xrandr` | Yes |
            | Scaling (Wayland) | `wlr-randr` | Yes (wlroots compositors) |
            | Gamma (X11) | `xrandr` | Yes |
            | Gamma (Wayland) | `wlr-randr` or `wl-gammarelay-rs` | Yes |

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full docs.
